<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="icons8-calculadora-de-maçã-32.png" type="image/png">
    
    <title>Calculadora</title>
</head>
<body>
    <header>
        <h1><i class="fa-solid fa-calculator"></i>Calculadora Simples</h1>
    </header>
    
    <main>
        <section id="calculadora">

            <p id="calculo"></p>

            <article id="container">
                
                <button class="tecla_preta" id="ce" onclick="apagar()">Ce</button>

                <button class="tecla_preta" id="c" onclick="limpar()">C</button>

                <button class="operadores"  id="dividir" onclick="insert('/')"><i class="fa-solid fa-divide"></i></button>

                <button class="tecla_preta" id="sete" onclick="insert('7')">7</button>
                <button class="tecla_preta" id="oito" onclick="insert('8')">8</button>
                <button class="tecla_preta" id="nove" onclick="insert('9')">9</button>

                <button class="operadores"  id="multi" onclick="insert('*')"><i class="fa-solid fa-xmark"></i></button>

                <button class="tecla_preta" id="quatro" onclick="insert('4')">4</button>
                <button class="tecla_preta" id="cinco" onclick="insert('5')">5</button>
                <button class="tecla_preta" id="seis" onclick="insert('6')">6</button>
                
                <button class="operadores"  id="subtrair" onclick="insert('-')"><i class="fa-solid fa-minus"></i></button>

                <button class="tecla_preta" id="um" onclick="insert('1')">1</button>
                <button class="tecla_preta" id="dois" onclick="insert('2')">2</button>
                <button class="tecla_preta" id="tres" onclick="insert('3')">3</button>

                <button class="operadores"  id="soma"><i class="fa-solid fa-plus" onclick="insert('+')"></i></button>
                
                <button class="tecla_preta" id="zero" onclick="insert('0')">0</button>
                <button class="tecla_preta" id="virgula"  onclick="insert('.')">.</button>

                <button class="operadores"  id="resultado" onclick="calcular()"><i class="fa-solid fa-equals"></i></button>
            </article>

        </section>
    </main>

    <footer>
        <p>Desenvolvido Por <a href="https://github.com/Rafaelzz7dev" target="_blank">Rafael Dev</a>.</p>
    </footer>

    <script src="https://kit.fontawesome.com/c1abd86632.js" crossorigin="anonymous"></script>
    <script src="calculadora.js"></script>
</body>
</html>
