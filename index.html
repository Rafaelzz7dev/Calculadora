<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="icons8-calculadora-de-maçã-32.png" type="image/png">
    
    <title>Calculadora</title>
</head>
<body>
    <header>
        <h1><i class="fa-solid fa-calculator"></i>Calculadora Simples</h1>
    </header>
    
    <main>
        <section id="calculadora">

            <div id="calculo"></div>

            <article id="container">
                <button class="tecla_preta" id="ce">CE</button>
                <button class="tecla_preta" id="c">C</button>

                <button class="operadores"  id="dividir"><i class="fa-solid fa-divide"></i></button>

                <button class="tecla_preta" id="sete">7</button>
                <button class="tecla_preta" id="oito">8</button>
                <button class="tecla_preta" id="nove">9</button>

                <button class="operadores"  id="multi"><i class="fa-solid fa-xmark"></i></button>

                <button class="tecla_preta" id="quatro">4</button>
                <button class="tecla_preta" id="cinco">5</button>
                <button class="tecla_preta" id="seis">6</button>
                
                <button class="operadores"  id="subtrair"><i class="fa-solid fa-minus"></i></button>

                <button class="tecla_preta" id="um">1</button>
                <button class="tecla_preta" id="dois">2</button>
                <button class="tecla_preta" id="tres">3</button>

                <button class="operadores"  id="soma"><i class="fa-solid fa-plus"></i></button>
                
                <button class="tecla_preta" id="zero">0</button>
                <button class="tecla_preta" id="virgula">,</button>

                <button class="operadores"  id="resultado"><i class="fa-solid fa-equals"></i></button>
            </article>

        </section>
    </main>

    <footer>
        <p>Desenvolvido Por <a href="https://github.com/Rafaelzz7dev" target="_blank">Rafael Dev</a>.</p>
    </footer>

    <script src="https://kit.fontawesome.com/c1abd86632.js" crossorigin="anonymous"></script>
</body>
</html>
